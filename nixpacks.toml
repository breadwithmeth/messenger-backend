[variables]
NODE_ENV = "production"
NPM_CONFIG_UPDATE_NOTIFIER = "false"
NPM_CONFIG_FUND = "false"

[phases.setup]
nixPkgs = ["nodejs_20", "openssl", "bash"]

[phases.install]
cmds = [
  "npm ci",
  "npx prisma generate"
]

[phases.build]
cmds = [
  "npm run build",
  "npm prune --omit=dev"
]

[start]
cmd = "sh -c 'until npx prisma migrate deploy; do echo \"DB not ready, retrying...\"; sleep 3; done; node dist/server.js'"
